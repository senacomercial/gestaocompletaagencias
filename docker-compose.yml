services:
  postgres:
    image: postgres:16-alpine
    container_name: gestaoagencias_db
    environment:
      POSTGRES_USER: agencia
      POSTGRES_PASSWORD: agencia123
      POSTGRES_DB: gestaoagencias
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agencia -d gestaoagencias"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
